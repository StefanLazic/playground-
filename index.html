<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Cat Generator 🐱</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #333;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      text-align: center;
    }
    p.subtitle {
      margin: 0 0 24px;
      opacity: 0.8;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      padding: 16px;
      width: min(560px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .image-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f3f3f3;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .status {
      position: absolute;
      font-size: 0.95rem;
      color: #777;
    }
    button {
      appearance: none;
      border: none;
      background: #ff6f61;
      color: white;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease;
      box-shadow: 0 6px 14px rgba(255, 111, 97, 0.4);
    }
    button:hover { background: #ff5546; }
    button:active { transform: scale(0.97); }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      box-shadow: none;
    }
    footer {
      margin-top: 20px;
      font-size: 0.85rem;
      opacity: 0.7;
    }
    footer a { color: inherit; }
  </style>
</head>
<body>
  <h1>Random Cat Generator 🐱</h1>
  <p class="subtitle">Click the button to summon a new feline friend.</p>

  <div class="card">
    <div class="image-wrapper" id="imageWrapper">
      <span class="status" id="status">Loading…</span>
      <img id="catImage" alt="A random cat" style="display:none;" />
    </div>
    <button id="newCatBtn" type="button">New Cat</button>
  </div>

  <footer>
    Images from <a href="https://cataas.com" target="_blank" rel="noopener">cataas.com</a>
  </footer>

  <script>
    (function () {
      const img = document.getElementById('catImage');
      const status = document.getElementById('status');
      const btn = document.getElementById('newCatBtn');

      function loadNewCat() {
        btn.disabled = true;
        status.textContent = 'Loading…';
        status.style.display = 'block';
        img.style.display = 'none';

        // Cache-busting query param ensures a fresh random image each click.
        const url = 'https://cataas.com/cat?random=' + Date.now() +
                    '-' + Math.random().toString(36).slice(2);

        const tempImg = new Image();
        tempImg.onload = function () {
          img.src = tempImg.src;
          img.style.display = 'block';
          status.style.display = 'none';
          btn.disabled = false;
        };
        tempImg.onerror = function () {
          status.textContent = 'Could not load cat 😿 Try again.';
          btn.disabled = false;
        };
        tempImg.src = url;
      }

      btn.addEventListener('click', loadNewCat);
      loadNewCat();
    })();
  </script>
</body>
</html>
